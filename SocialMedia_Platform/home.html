<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRA - Home</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body class="page-layout">
    <!-- Header / Navbar -->
    <header class="navbar">
        <div class="brand">
            <div class="brand-link">
                <img src="assets/Logo1.png" width="80" alt="SocialMedia Logo" class="logo-icon">
                <h1 class="site-name">ASTRA</h1>
            </div>
        </div>
        <nav class="nav" id="navBar">
            <ul class="nav-links" id="navList">
                <li><a href="home.html" class="active">Home</a></li>
                <li><a href="profile.html" id="profilebtn">Profile</a></li>
                <li><button type="button" id="logoutBtn">Logout</button></li>
            </ul>
        </nav>
    </header>

    <!-- The Main -->
    <main class="feed-container">
        <!-- Create posts -->
        <section class="create-post">
            <h2>Create a New Post</h2>
            <form id="createPostForm">
                <textarea id="postContent" rows="3" placeholder="What's on your mind?"></textarea>
                <button type="submit" id="submitPostBtn">Post</button>
                <p id="createPostMessage"></p>
            </form>
        </section>

        <h2>New Posts</h2>
        <div class="posts-container" id="postsContainer">
            <!-- Example post template (will be replaced by JavaScript when runs it.. -->
            <section class="post">
                <div class="post-header">
                    <img src="assets/PFP_Blank.jpg" width="25" alt="User avatar" class="post-avatar">
                    <div class="post-meta">
                        <span class="post-author">Abdullah Hamed</span>
                        <span class="post-date">Just now</span>
                    </div>
                </div>
                <div class="post-content">
                    <p>This is an example post with a picture. Your feed will show real posts from users you follow.</p>

                </div>
                <div class="post-actions">
                    <button class="like-btn">❤️ 0</button>
                    <button class="comment-btn">💬 Comment</button>
                </div>
                <div class="comments-section">
                    <div class="comment">
                        <span class="comment-author">Jane Doe</span>
                        <p class="comment-text">Great post!</p>
                    </div>
                </div>
            </section>
            <!-- More posts will be addedd here.. -->
        </div>
    </main>

    <footer>
        <div class="social-links">
            <a href="#" target="_blank">Twitter</a>
            <a href="#" target="_blank">Instagram</a>
            <a href="#" target="_blank">TikTok</a>
        </div>
        <p>&copy; 2026 ASTRA. All rights reserved.</p>
    </footer>

    <script type="module" src="JavaScript/home.js"></script>
</body>

</html>
