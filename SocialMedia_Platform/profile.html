<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASTRA</title>
  <link rel="stylesheet" href="CSS/style.css">
  <style>

</style>

</head>
<body>

  <header class="navbar">
    <div class="brand">
      <a href="home.html" class="brand-link">
        <img src="assets/Logo1.png" alt="ASTRA Logo" class="logo-icon">
        <h1 class="site-name">ASTRA</h1>
      </a>
    </div>
    <nav class="nav" id="navBar">
      <ul class="nav-links" id="navList">
        <li><a href="home.html">Home</a></li>
        <li><a href="profile.html" class="active">Profile</a></li>
        <li><button type="button" id="logoutBtn">Logout</button></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="profile-header">
      <h2>Profile</h2>
      <article id="profileHeader">
        <img src="assets/Avatar-01.svg" alt="Profile Avatar" height="200" width="200" />
        <h3 id="profileName"></h3>
        <p id="profileBio"></p>
      </article>
        <a href="edit_profile.html">
        <button id="editBtn">Edit Profile</button>
        </a>
    </section>

    <section class="profile-info">
        <h2 id="username"></h2>
    <section id="followInfo">
        <p>Followers: <span id="followersCount"></span></p>
        <p>Following: <span id="followingCount"></span></p> 
        <p>Total Posts: <span id="postsCount"></span></p><br>
     </section>
        
        <p>Bio: <span id="bio"></span></p> <br> <br>
        <button id="followBtn">Follow</button>
    </section>

    <section class="user-posts">
        <h3>User Posts</h3>
        <div id="postsContainer"></div>
    </section>

  </main>

  <footer>
    <div class="social-links">
      <a href="#" target="_blank">Twitter</a>
      <a href="#" target="_blank">Instagram</a>
      <a href="#" target="_blank">TikTok</a>
    </div>
    <p>&copy; 2026 ASTRA. All rights reserved.</p>
  </footer>


<script type="module" src="JavaScript/profile.js"></script>

</body>
</html>
