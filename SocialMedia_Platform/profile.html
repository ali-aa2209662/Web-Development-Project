<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialApp</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="icon" type="image/png" href="media/favicon.png">
</head>
<body>

  <header>
    <h1>SocialApp</h1>
    <nav aria-label="Main Navigation">
      <ul>
        <li><a href="home.html">Main</a></li>
        <li><a href="feed.html">Posts</a></li>
        <li><a href="profile.html" class="active">Profile</a></li>
        <li><button onclick="logout()">Logout</button></li>
      </ul>
    </nav>
  </header>

  <main>

    <section>
      <h2>Profile</h2>
      <article>
        <img src="media/Avatar-01.svg" alt="Profile Avatar" />
        <h3 id="profileName"></h3>
        <p id="profileBio"></p>
      </article>
    </section>

    <section class="profile-info">
        <h2 id="username"></h2>
        <p id="bio"></p>
        <p>Followers: <span id="followersCount"></span></p>
        <p>Following: <span id="followingCount"></span></p>
        <p>Posts: <span id="postsCount"></span></p>
        <button id="followBtn"></button>
        <button id="editBtn">Edit Profile</button>
    </section>

    <section class="user-posts">
        <h3>User Posts</h3>
        <div id="postsContainer"></div>
    </section>

  </main>

  <footer></footer>

  <script src="JavaScript/profile.js"></script>
</body>
</html>
