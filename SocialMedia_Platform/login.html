    <div class="Login-Card">
    <div class="logo-wrapper">
        <img src="assets/Logo1.png" alt="App Logo" > 
    </div>

    <h1>Login</h1>
    <p class="welcome-message">Welcome back! Please enter your credentials to access your account.</p>

    <div class="error-message" id="error-message" style="display: none;">Incorrect Username or Password. Please Try again.</div>
    <form id="LoginForm">

        <div class="form-group">
        <label for="Username">Username</label>
        <input type="text" name="Username" id="Username" placeholder="Username" required>
        </div>

        <div class="form-group">
        <label for="Password">Password</label>
        <div class="Password-wrapper">
        <input type="password" name="Password" id="Password" placeholder="Password" required >
        <button type="button" id="TogglePassword" class="TogglePassword" claria-label="Show Password"><i class="fas fa-eye"></i></button>
        </div>
        </div>
        <input type="submit" value="Login" id="login-button"> 

        <div class="divider">or</div>
        <button type="button" id="SignupButton" onclick="window.location.href='signup.html'">Create Account</button>
    </form>

    </div>
    
    
    <script src="JavaScript/login.js" type="module"></script>
</body>
