<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile – SocialApp</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<header class="edit-profile-header">
    <h1>SocialApp</h1><br>
    <nav id="navBar">
        <ul id="navList" class="nav-list">
            <li><a href="home.html">Home</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><button id="logoutBtn">Logout</button></li>
        </ul>
    </nav>
</header>

<main>
    <h2>Update Your Profile Information:</h2><br>
    <form id="editProfileForm" enctype="multipart/form-data">

        <label>Profile Image:</label><br>
        <img id="preview" src="assets/Avatar-01.svg" width="120"><br>
        <p id="imageuploadStatus">Upload Image</p><br>
        <input type="file" id="imageInput" accept="image/*"><br><br>
        

        <label>Username:</label>
        <input type="text" id="editUsername"><br><br>

        <label>Email:</label>
        <input type="email" id="editEmail"><br><br>
        
        <label>Password:</label>
        <input type="password" id="editPassword"><br><br>

        <label>Confirm Password:</label>
        <input type="password" id="confirmPassword"><br><br>

        <label>Bio:</label>
        <textarea id="editBio"></textarea><br><br>

       

        <button type="submit">Save Changes</button>
    </form>
    <a href="profile.html">
    <button id="cancelBtn">Cancel</button> </a>
</main>

<footer>
    <p>&copy; 2026 SocialApp. All rights reserved.</p>
</footer>

<script type="module" src="JavaScript/edit_profile.js"></script>

</body>
</html>
