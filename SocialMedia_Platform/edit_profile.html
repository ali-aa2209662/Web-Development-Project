<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile – SocialApp</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<header>
    <h1>Edit Profile</h1>
    <nav id="navBar">
        <ul>
            <li><a href="home.html">Main</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="edit_profile.html" class="active">Edit Profile</a></li>
            <li><button id="logoutBtn">Logout</button></li>
        </ul>
    </nav>
</header>

<main>
    <form id="editProfileForm">
        <label>Username:</label>
        <input type="text" id="editUsername"><br><br>

        <label>Email:</label>
        <input type="email" id="editEmail"><br><br>

        <label>Bio:</label>
        <textarea id="editBio"></textarea><br><br>

        <label>Password:</label>
        <input type="password" id="editPassword"><br><br>

        <button type="submit">Save Changes</button>
    </form>
    <button id="cancelBtn">Cancel</button>
</main>

<footer>
    <p>&copy; 2026 SocialApp. All rights reserved.</p>
</footer>

<script type="module" src="JavaScript/edit_profile.js"></script>

</body>
</html>
